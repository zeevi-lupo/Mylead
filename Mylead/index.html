<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Link CPA Member</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: white;
        }

        .glass-container {
            width: 100%;
            max-width: 450px; /* Sedikit dilonggarkan agar lebih lega */
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            padding: 25px 15px; /* Padding disesuaikan */
            border-radius: 24px;
            box-sizing: border-box;
        }

        .header-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-title h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .header-title p {
            margin: 0;
            font-size: 14px;
            color: #cbd5e1;
        }

        /* --- HALAMAN 1: Tombol Member --- */
        .member-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-member {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 20px;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .btn-member:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* --- HALAMAN 2: Daftar Link Game --- */
        .game-links {
            display: none; 
            flex-direction: column;
            gap: 20px; /* Jarak antar game dilonggarkan */
        }

        .btn-kembali {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-bottom: 15px;
            width: 100%; /* Selembar halaman agar mudah diklik */
            text-align: center;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
        }

        .btn-kembali:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 18px;
        }

        .game-title {
            font-size: 16px; /* Font judul game dinaikkan */
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f1f5f9;
        }

        /* Tampilan Group Input yang Dirapikan total (Stacked/Tumpuk) */
        .input-group {
            display: flex;
            flex-direction: column; /* Menumpuk elemen ke bawah */
            gap: 10px; /* Jarak antara input dan tombol */
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px; /* Padding diperbesar agar lega */
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            outline: none;
            box-sizing: border-box; /* Sangat penting agar padding tidak merusak lebar */
            
            /* Memotong teks panjang */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-copy {
            width: 100%; /* Tombol selembar halaman di bawah input */
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            color: white;
            padding: 14px; /* Tinggi disamakan dengan input */
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px; /* Font sedikit diperbesar */
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.5px;
            text-transform: uppercase; /* Membuat teks jadi kapital semua agar tegas */
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
            box-sizing: border-box;
        }

        .btn-copy:active {
            transform: scale(0.98); /* Efek membal saat ditekan */
        }
        
        .ikon { margin-right: 12px; font-size: 20px; }
    </style>
</head>
<body>

    <div class="glass-container">

        <div id="halaman-utama">
            <div class="header-title">
                <h2>LINK MYLEAD</h2>
                <p>pilih sesuai username masing masing</p>
            </div>

            <div class="member-list">
                <button class="btn-member" onclick="bukaLinkMember('thorfin', 'Thorfin')"><span class="ikon">ðŸ—¡ï¸</span> Thorfin</button>
                <button class="btn-member" onclick="bukaLinkMember('poseidon', 'Poseidon')"><span class="ikon">ðŸ”±</span> Poseidon</button>
                <button class="btn-member" onclick="bukaLinkMember('luxury33', 'Luxury33')"><span class="ikon">ðŸ¦ˆ</span> Luxury33</button>
                <button class="btn-member" onclick="bukaLinkMember('batako', 'Batako')"><span class="ikon">ðŸ§±</span> Batako</button>
                <button class="btn-member" onclick="bukaLinkMember('kahuna', 'Kahuna Laguna')"><span class="ikon">ðŸŒŠ</span> Kahuna Laguna</button>
                <button class="btn-member" onclick="bukaLinkMember('angin', 'Angin')"><span class="ikon">ðŸŒªï¸</span> Angin</button>
            </div>
        </div>

        <div id="halaman-link" class="game-links">
            <button class="btn-kembali" onclick="kembaliKeMenu()">â¬… Kembali ke Daftar Member</button>
            
            <div class="header-title" style="margin-bottom: 25px; margin-top: 10px;">
                <p>Link mylead Khusus Untuk:</p>
                <h2 id="nama-member-aktif" style="color: #38bdf8;">Nama Member</h2>
            </div>

            <div class="game-card">
                <div class="game-title">ðŸŽ² Monopoly Go</div>
                <div class="input-group">
                    <input type="text" id="input-monopoly" readonly value="">
                    <button class="btn-copy" onclick="salinLink('input-monopoly', this)">Salin Link</button>
                </div>
            </div>

            <div class="game-card">
                <div class="game-title">â˜• Gossip Harbor</div>
                <div class="input-group">
                    <input type="text" id="input-gossip" readonly value="">
                    <button class="btn-copy" onclick="salinLink('input-gossip', this)">Salin Link</button>
                </div>
            </div>

            <div class="game-card">
                <div class="game-title">âœˆï¸ Travel Town</div>
                <div class="input-group">
                    <input type="text" id="input-travel" readonly value="">
                    <button class="btn-copy" onclick="salinLink('input-travel', this)">Salin Link</button>
                </div>
            </div>

            <div class="game-card">
                <div class="game-title">ðŸ§© Match Master</div>
                <div class="input-group">
                    <input type="text" id="input-match" readonly value="">
                    <button class="btn-copy" onclick="salinLink('input-match', this)">Salin Link</button>
                </div>
            </div>
            
            <div class="game-card">
                <div class="game-title">ðŸ‘« Dating</div>
                <div class="input-group">
                    <input type="text" id="input-dating" readonly value="">
                    <button class="btn-copy" onclick="salinLink('input-dating', this)">Salin Link</button>
                </div>
            </div>

        </div>

    </div>

    <script>
        // MASUKKAN LINK PARAMETER CPA ANDA DI SINI (Ganti teks "MASUKKAN_LINK_DI_SINI")
        const dataLinkCPA = {
            'thorfin': {
                monopoly: "https://tinyurl.com/yeyk6b6t",
                gossip: "https://tinyurl.com/4k5rn38k",
                travel: "https://tinyurl.com/4ttyrnay",
                match: "https://tinyurl.com/3p76vbe6", 
                dating: "https://tinyurl.com/3ye5j2we"
            },
            'poseidon': {
                monopoly: "https://tinyurl.com/5d4z9jz3",
                gossip: "https://tinyurl.com/5ywbpc75",
                travel: "https://tinyurl.com/mpk4t8hk",
                match: "https://tinyurl.com/33yd579h", 
                dating: "Hubungi admin untuk membuat"
            },
            'luxury33': {
                monopoly: "https://tinyurl.com/22jw96te",
                gossip: "https://tinyurl.com/y9xr98j8",
                travel: "Hubungi admin untuk membut",
                match: "Hubungi admin untuk membuat", 
                dating: "Hubungi admin untuk membuat"
            },
            'batako': {
                monopoly: "https://tinyurl.com/2p9kcv2z",
                gossip: "https://tinyurl.com/mr4v32aw",
                travel: "hubungi admin untuk membuat",
                match: "https://tinyurl.com/yfzddp39", 
                dating: "Hubungi admin untuk membuat"
            },
            'kahuna': {
                monopoly: "https://tinyurl.com/m3xz6s8v",
                gossip: "https://tinyurl.com/yc52864j",
                travel: "https://tinyurl.com/ja4fhura",
                match: "https://tinyurl.com/26sxswe5", 
                dating: "Hubungi admin untuk membuat"
            },
            'angin': {
                monopoly: "https://tinyurl.com/4wfj94nc",
                gossip: "https://tinyurl.com/3r39xh9j",
                travel: "https://tinyurl.com/yc559ude",
                match: "https://tinyurl.com/5868a3ez", 
                dating: "https://tinyurl.com/mr443de2"
            }
        };

        // --- Logika Buka Menu ---
        function bukaLinkMember(idMember, namaTampilan) {
            document.getElementById('halaman-utama').style.display = 'none';
            document.getElementById('halaman-link').style.display = 'flex';
            document.getElementById('nama-member-aktif').innerText = namaTampilan;

            let linkMemberIni = dataLinkCPA[idMember];
            
            // Masukkan link ke dalam kolom input
            document.getElementById('input-monopoly').value = linkMemberIni.monopoly;
            document.getElementById('input-gossip').value = linkMemberIni.gossip;
            document.getElementById('input-travel').value = linkMemberIni.travel;
            document.getElementById('input-match').value = linkMemberIni.match;
            document.getElementById('input-dating').value = linkMemberIni.dating;

            // Reset tombol salin
            let semuaTombolCopy = document.getElementsByClassName('btn-copy');
            for(let i=0; i<semuaTombolCopy.length; i++){
                semuaTombolCopy[i].innerHTML = "Salin Link";
                semuaTombolCopy[i].style.background = "linear-gradient(135deg, #6366f1, #a855f7)";
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function kembaliKeMenu() {
            document.getElementById('halaman-link').style.display = 'none';
            document.getElementById('halaman-utama').style.display = 'block';
        }

        // --- Logika Salin/Copy Text ---
        function salinLink(idInput, tombol) {
            var teksLink = document.getElementById(idInput);
            
            teksLink.select();
            teksLink.setSelectionRange(0, 99999); 
            
            navigator.clipboard.writeText(teksLink.value).then(function() {
                // Berhasil disalin
                tombol.innerHTML = "Tersalin âœ“";
                tombol.style.background = "#10b981"; // Hijau sukses
                
                setTimeout(function() {
                    tombol.innerHTML = "Salin Link";
                    tombol.style.background = "linear-gradient(135deg, #6366f1, #a855f7)";
                }, 1500); // Reset setelah 1.5 detik
            }).catch(function(err) {
                alert('Gagal menyalin link. Silakan salin manual.');
            });
        }
    </script>
</body>
</html>
